        .item-desc { display: block; font-size: 0.9rem; color: var(--text-muted); font-style: italic; margin-top: -3px; margin-bottom: 15px; }

        function renderMenu(lang) {
            const data = menuData[lang] || menuData['en']; 
            
            document.title = "Casa San Giacomo - " + data.title;
            document.getElementById('main-subtitle').textContent = data.title;
            
            const container = document.getElementById('menu-container');
            const footerContainer = document.getElementById('footer-container');
            container.innerHTML = '';
            footerContainer.innerHTML = '';

            // 1. Clona le categorie del cibo/bevande dalla lingua corrente
            let allCategories = JSON.parse(JSON.stringify(data.categories));

            // 2. Aggiungi la Carta dei Vini (con i titoli tradotti)
            const wineTrans = wineCategories[lang] || wineCategories['en'];
            wineListDatabase.forEach(wineCategory => {
                allCategories.push({
                    name: wineTrans[wineCategory.id], // Traduce dinamicamente (es. "Vini Rossi")
                    items: wineCategory.items // Mantiene i vini invariati
                });
            });

            // 3. Renderizza tutto (Cibo + Vini)
            allCategories.forEach((category, index) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.style.animationDelay = `${index * 0.15}s`; 

                const catTitle = document.createElement('h2');
                catTitle.className = 'category-title';
                catTitle.textContent = category.name;
                categoryDiv.appendChild(catTitle);

                category.items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'menu-item';

                    const itemDetails = document.createElement('div');
                    itemDetails.className = 'item-details';

                    const textContainer = document.createElement('div');
                    
                    const itemName = document.createElement('span');
                    itemName.className = 'item-name';
                    itemName.textContent = item.name;
                    textContainer.appendChild(itemName);

                    if (item.desc) {
                        const itemDesc = document.createElement('span');
                        itemDesc.className = 'item-desc';
                        itemDesc.textContent = item.desc;
                        textContainer.appendChild(itemDesc);
                    }

                    itemDetails.appendChild(textContainer);
                    itemDiv.appendChild(itemDetails);

                    if (item.price) {
                        const itemPrice = document.createElement('span');
                        itemPrice.className = 'item-price';
                        itemPrice.textContent = item.price;
                        itemDiv.appendChild(itemPrice);
                    }

                    categoryDiv.appendChild(itemDiv);
                });

                container.appendChild(categoryDiv);
            });

            // Footer
            if(data.info) {
                const footerHTML = `
                    <div class="menu-footer">

                        <p><em>${data.info.allergy}</em></p>
                        <div class="wifi-box">
                            Wi-Fi Password: <strong>bixio456</strong>
                        </div>
                    </div>
                `;
                footerContainer.innerHTML = footerHTML;
            }

            // Gestione RTL
            const isRTL = lang === 'he' || lang === 'fa';
            document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            document.getElementById('lang-select').value = lang;
        }

        function getInitialLanguage() {
            const savedLang = localStorage.getItem('appLang');
            if (savedLang && menuData[savedLang]) return savedLang;
            const browserLangFull = navigator.language; 
            const browserLangShort = browserLangFull.substring(0, 2).toLowerCase(); 
            if (menuData[browserLangFull]) return browserLangFull;
            if (menuData[browserLangShort]) return browserLangShort;
            return 'it';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const initialLang = getInitialLanguage();
            renderMenu(initialLang);

            document.getElementById('lang-select').addEventListener('change', (e) => {
                const selectedLang = e.target.value;
                localStorage.setItem('appLang', selectedLang);
                renderMenu(selectedLang);
            });
        });
    </script>
