        .title-section { text-align: center; margin-bottom: 60px; }

        h2.menu-subtitle { font-family: 'Source Sans Pro', sans-serif; font-size: 1.1rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 4px; font-weight: 400; }
        h2.menu-subtitle::after { content: ''; display: block; width: 40px; height: 2px; background-color: var(--accent-color); margin: 15px auto 0; }
        .category { margin-bottom: 50px; opacity: 0; transform: translateY(20px); animation: fadeIn 0.6s ease forwards; }
        .category-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }

        .item-name { font-weight: 600; font-size: 1.1rem; max-width: 85%; background-color: var(--bg-color); padding-right: 5px; }
        .item-desc { display: block; font-size: 0.9rem; color: var(--text-muted); font-style: italic; margin-top: -3px; margin-bottom: 15px; }
        .item-price { font-weight: 600; font-size: 1.1rem; white-space: nowrap; background-color: var(--bg-color); padding-left: 5px; color: var(--accent-color); }
        .menu-footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; font-size: 0.95rem; color: var(--text-muted); opacity: 0; animation: fadeIn 1s ease 1s forwards; }

            const data = menuData[lang] || menuData['en']; 
            document.title = "Casa San Giacomo - " + data.title;
            document.getElementById('main-subtitle').textContent = data.title;
            const container = document.getElementById('menu-container');
            const footerContainer = document.getElementById('footer-container');
            container.innerHTML = '';
            footerContainer.innerHTML = '';

            let allCategories = JSON.parse(JSON.stringify(data.categories));
            const wineTrans = wineCategories[lang] || wineCategories['en'];
            wineListDatabase.forEach(wineCategory => {
                allCategories.push({
                    name: wineTrans[wineCategory.id],
                    items: wineCategory.items
                });
            });

            allCategories.forEach((category, index) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.style.animationDelay = `${index * 0.1}s`; 
                const catTitle = document.createElement('h2');
                catTitle.className = 'category-title';
                catTitle.textContent = category.name;
                categoryDiv.appendChild(catTitle);

                category.items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'menu-item';
                    const itemDetails = document.createElement('div');
                    itemDetails.className = 'item-details';
                    const textContainer = document.createElement('div');
                    const itemName = document.createElement('span');
                    itemName.className = 'item-name';
                    itemName.textContent = item.name;
                    textContainer.appendChild(itemName);
                    if (item.desc) {
                        const itemDesc = document.createElement('span');
                        itemDesc.className = 'item-desc';
                        itemDesc.textContent = item.desc;
                        textContainer.appendChild(itemDesc);
                    }
                    itemDetails.appendChild(textContainer);
                    itemDiv.appendChild(itemDetails);
                    if (item.price) {
                        const itemPrice = document.createElement('span');
                        itemPrice.className = 'item-price';
                        itemPrice.textContent = item.price;
                        itemDiv.appendChild(itemPrice);
                    }
                    categoryDiv.appendChild(itemDiv);
                });
                container.appendChild(categoryDiv);
            });

            if(data.info) {
                footerContainer.innerHTML = `
                    <div class="menu-footer">
                        <p>${data.info.cover}</p>
                        <p><em>${data.info.allergy}</em></p>
                        <div class="wifi-box">Wi-Fi Password: <strong>Bixio456</strong></div>
                    </div>
                `;
            }

            const isRTL = lang === 'he' || lang === 'fa';
            document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            document.getElementById('lang-select').value = lang;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const browserLang = navigator.language.substring(0, 2);
            const initialLang = menuData[browserLang] ? browserLang : 'it';
            renderMenu(initialLang);

            document.getElementById('lang-select').addEventListener('change', (e) => {
                renderMenu(e.target.value);
            });
        });
    </script>
</body>
</html>
